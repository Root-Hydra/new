name: BDCS Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libffi-dev \
            git \
            zip \
            unzip \
            autoconf \
            automake \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libgdbm-dev \
            libnss3-dev \
            libssl-dev \
            libreadline-dev \
            libsqlite3-dev \
            sqlite3 \
            bzip2 \
            libbz2-dev

      - name: Build with Buildozer
        # সরাসরি অ্যাকশন ব্যবহার করছি যেন পাথ অটোমেটিক হ্যান্ডেল হয়
        uses: ArtemSerebriakov/buildozer-action@v1
        with:
          command: buildozer -v android debug
          buildozer_version: master
          # 'new' রিপোজিটরির পাথ ফিক্সড করার জন্য এটি জরুরি
          repository_root: .

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BDCS-WiFi-Tool
          path: bin/*.apk
